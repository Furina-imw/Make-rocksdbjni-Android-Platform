name: Build JRE 25 for Android arm64-v8a (Fixed Cross-Compile)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build JRE 25 (arm64-v8a)
    runs-on: ubuntu-latest

    steps:
      - name: Maximize disk space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 20480
          swap-size-mb: 1024

      - name: Install minimal build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf zip unzip ccache tar xz-utils file

      - name: Setup Boot JDK (JDK 24)
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
          unzip -q android-ndk-r27c-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r27c" >> $GITHUB_ENV
          echo "ANDROID_NDK=$PWD/android-ndk-r27c" >> $GITHUB_ENV

      - name: Create NDK Toolchain Wrappers (Fake GCC)
        run: |
          mkdir -p $GITHUB_WORKSPACE/toolchain/bin
          NDK_BIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin
          
          # Tạo wrapper script giả lập GCC cho C compiler
          cat > $GITHUB_WORKSPACE/toolchain/bin/aarch64-linux-android-gcc << 'EOF'
#!/bin/bash
REAL_CC="__NDK_BIN__/aarch64-linux-android24-clang"
case "$1" in
    --version|-v)
        echo "gcc (GCC) 13.0.0"
        exit 0
        ;;
    -dumpversion)
        echo "13.0.0"
        exit 0
        ;;
    -dumpfullversion)
        echo "13.0.0"
        exit 0
        ;;
esac
exec "$REAL_CC" "$@"
EOF
          chmod +x $GITHUB_WORKSPACE/toolchain/bin/aarch64-linux-android-gcc
          sed -i "s|__NDK_BIN__|$NDK_BIN|g" $GITHUB_WORKSPACE/toolchain/bin/aarch64-linux-android-gcc
          
          # Tạo wrapper script giả lập G++ cho C++ compiler
          cat > $GITHUB_WORKSPACE/toolchain/bin/aarch64-linux-android-g++ << 'EOF'
#!/bin/bash
REAL_CXX="__NDK_BIN__/aarch64-linux-android24-clang++"
case "$1" in
    --version|-v)
        echo "g++ (GCC) 13.0.0"
        exit 0
        ;;
    -dumpversion)
        echo "13.0.0"
        exit 0
        ;;
    -dumpfullversion)
        echo "13.0.0"
        exit 0
        ;;
esac
exec "$REAL_CXX" "$@"
EOF
          chmod +x $GITHUB_WORKSPACE/toolchain/bin/aarch64-linux-android-g++
          sed -i "s|__NDK_BIN__|$NDK_BIN|g" $GITHUB_WORKSPACE/toolchain/bin/aarch64-linux-android-g++
          
          # Tạo symlink cho các công cụ LLVM khác với tiền tố chuẩn
          for tool in ar nm strip objcopy objdump readelf c++filt dwp ranlib as ld profdata; do
            ln -sf $NDK_BIN/llvm-$tool $GITHUB_WORKSPACE/toolchain/bin/aarch64-linux-android-$tool
          done
          
          # Also create non-prefixed symlinks
          ln -sf $GITHUB_WORKSPACE/toolchain/bin/aarch64-linux-android-gcc $GITHUB_WORKSPACE/toolchain/bin/gcc
          ln -sf $GITHUB_WORKSPACE/toolchain/bin/aarch64-linux-android-g++ $GITHUB_WORKSPACE/toolchain/bin/g++
          ln -sf $NDK_BIN/llvm-ar $GITHUB_WORKSPACE/toolchain/bin/ar
          ln -sf $NDK_BIN/llvm-nm $GITHUB_WORKSPACE/toolchain/bin/nm
          ln -sf $NDK_BIN/llvm-strip $GITHUB_WORKSPACE/toolchain/bin/strip

      - name: Clone OpenJDK 25 Source Code
        run: |
          git clone --depth 1 -b jdk25 https://github.com/openjdk/jdk.git jdk25

      - name: Configure OpenJDK (Using Fake GCC Toolchain)
        run: |
          cd jdk25
          bash configure \
            --openjdk-target=aarch64-linux-android \
            --with-sysroot=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot \
            --with-toolchain-path=$GITHUB_WORKSPACE/toolchain/bin \
            --with-boot-jdk=$JAVA_HOME \
            --disable-warnings-as-errors \
            --enable-unlimited-crypto \
            --enable-headless-only \
            --with-freetype=bundled \
            --with-libpng=bundled \
            --with-zlib=bundled \
            --with-harfbuzz=bundled \
            --with-lcms=bundled \
            --with-native-debug-symbols=internal \
            --with-jvm-variants=server \
            --with-extra-cflags="-fPIE" \
            --with-extra-ldflags="-pie"

      - name: Build OpenJDK Images
        run: |
          cd jdk25
          make images JOBS=$(nproc)

      - name: Create Optimized JRE using jlink
        run: |
          cd jdk25
          JDK_IMAGE=build/linux-aarch64-server-release/images/jdk
          
          $JDK_IMAGE/bin/jlink \
            --module-path $JDK_IMAGE/jmods \
            --add-modules ALL-MODULE-PATH \
            --no-man-pages \
            --no-header-files \
            --compress=zip-6 \
            --output ../jre-25-android-arm64

      - name: Cleanup incompatible native libraries
        run: |
          cd jre-25-android-arm64
          find . -name "libjsound.so" -delete
          find . -name "libawt_xawt.so" -delete
          find . -name "libsplashscreen.so" -delete

      - name: Package as tar.xz
        run: |
          tar -cJf jre-25-android-arm64-v8a.tar.xz jre-25-android-arm64
          ls -lh jre-25-android-arm64-v8a.tar.xz

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
